<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock &mdash; Admin &mdash; The Trio Jerseys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    body { background: var(--bg-secondary); }
    .admin-header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 12px var(--gutter);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header-inner .logo { display: flex; align-items: center; gap: 4px; }
    .admin-header-inner .logo-main { font-family: var(--font-heading); font-size: 1.25rem; text-transform: uppercase; letter-spacing: -0.02em; }
    .admin-header-inner .logo-sub { font-family: var(--font-body); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
    .admin-nav { display: flex; gap: 8px; align-items: center; }
    .admin-nav a { padding: 8px 16px; font-size: 0.875rem; font-weight: 600; border-radius: 4px; }
    .admin-nav a:hover { background: var(--bg-secondary); }
    .admin-nav a.active { background: var(--btn-bg); color: var(--btn-text); }
    .admin-main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 32px var(--gutter);
    }
    .admin-main h1 { margin-bottom: 24px; }
    .stock-table-wrap { overflow-x: auto; background: var(--bg-primary); border: 1px solid var(--border); }
    table.stock-table { width: 100%; border-collapse: collapse; min-width: 600px; }
    table.stock-table th {
      text-align: left; padding: 12px 16px; font-size: 0.8125rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);
      border-bottom: 2px solid var(--border); background: var(--bg-secondary);
    }
    table.stock-table td { padding: 12px 16px; font-size: 0.875rem; border-bottom: 1px solid var(--border); }
    table.stock-table td.size-cell { text-align: center; font-weight: 700; }
    table.stock-table td.low-stock { color: var(--danger); background: rgba(255,0,0,0.05); }
    table.stock-table td.oos { color: var(--danger); font-weight: 700; }
    .stock-product-name { font-weight: 600; }
    .stock-product-meta { font-size: 0.75rem; color: var(--text-secondary); }
    .btn-restock { padding: 6px 14px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--bg-primary); border-radius: 4px; }
    .btn-restock:hover { background: var(--bg-secondary); }
    .btn-restock.low { border-color: var(--danger); color: var(--danger); }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      display: none; align-items: flex-start; justify-content: center;
      padding: 48px 24px; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal-card {
      background: var(--bg-primary);
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }
    .modal-card h2 { margin-bottom: 8px; }
    .modal-card p { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 20px; }
    .modal-card .form-group { margin-bottom: 12px; }
    .modal-card label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 4px; }
    .modal-card .stock-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .modal-card .stock-input-row span { font-weight: 600; width: 30px; }
    .modal-card .stock-input-row input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-body); font-size: 0.875rem; width: 80px; }
    .modal-card .stock-input-row .current { font-size: 0.8125rem; color: var(--text-secondary); }
    .modal-card .form-actions { display: flex; gap: 8px; margin-top: 20px; }
    .empty-stock { text-align: center; padding: 64px 0; color: var(--text-secondary); }
    .logout-btn { padding: 8px 16px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg-primary); border-radius: 4px; font-family: var(--font-body); }
    .logout-btn:hover { background: var(--bg-secondary); }
  </style>
</head>
<body>
  <header class="admin-header">
    <div class="admin-header-inner">
      <a href="dashboard.html" class="logo">
        <span class="logo-main">TRIO</span>
        <span class="logo-sub">ADMIN</span>
      </a>
      <nav class="admin-nav">
        <a href="dashboard.html">Orders</a>
        <a href="products.html">Products</a>
        <a href="stock.html" class="active">Stock</a>
        <button class="logout-btn" id="logout-btn">Log Out</button>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <h1>Stock Inventory</h1>
    <div class="stock-table-wrap">
      <table class="stock-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>S</th>
            <th>M</th>
            <th>L</th>
            <th>XL</th>
            <th style="text-align:center;">Actions</th>
          </tr>
        </thead>
        <tbody id="stock-body"></tbody>
      </table>
    </div>
    <div id="stock-empty" class="empty-stock" style="display:none;"><p>No products found.</p></div>
  </main>

  <div class="modal-overlay" id="restock-modal">
    <div class="modal-card">
      <h2 id="restock-title">Adjust Stock</h2>
      <p id="restock-product-name"></p>
      <form id="restock-form">
        <div id="restock-inputs"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="restock-save-btn">SAVE</button>
          <button type="button" class="btn btn-outline" id="restock-cancel-btn">CANCEL</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function getToken() { return localStorage.getItem('trio_admin_token'); }

    function checkAuth() {
      var token = getToken();
      if (!token) { window.location.href = 'login.html'; return false; }
      return true;
    }

    function authFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + getToken();
      return fetch(url, options);
    }

    (function() {
      var token = getToken();
      if (!token) { window.location.href = 'login.html'; return; }
      fetch('/api/admin/verify', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.valid) {
            localStorage.removeItem('trio_admin_token');
            window.location.href = 'login.html';
          }
        });
    })();

    var allProducts = [];

    function loadStock() {
      if (!checkAuth()) return;
      authFetch('/api/admin/products')
        .then(function(r) { return r.json(); })
        .then(function(products) {
          allProducts = products || [];
          renderStock(products);

          if (products.length === 0) {
            document.getElementById('stock-empty').style.display = 'block';
          }
        })
        .catch(function() {
          document.getElementById('stock-body').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:48px;color:var(--danger);">Failed to load products.</td></tr>';
        });
    }

    function renderStock(products) {
      var tbody = document.getElementById('stock-body');
      tbody.innerHTML = '';
      var allSizes = ['S', 'M', 'L', 'XL'];

      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        var stock = p.stock || {};
        var tr = document.createElement('tr');
        var nameCell = '<div class="stock-product-name">' + escapeHtml(p.name) + '</div><div class="stock-product-meta">' + escapeHtml(p.category) + (p.club ? ' &middot; ' + escapeHtml(p.club) : '') + (p.country ? ' &middot; ' + escapeHtml(p.country) : '') + '</div>';

        var sizeCells = '';
        var hasLowStock = false;
        for (var si = 0; si < allSizes.length; si++) {
          var sz = allSizes[si];
          var qty = stock[sz] != null ? stock[sz] : '-';
          var classes = 'size-cell';
          if (qty === 0 || qty === '-') { classes += ' oos'; }
          else if (qty < 3) { classes += ' low-stock'; hasLowStock = true; }
          sizeCells += '<td class="' + classes + '">' + qty + '</td>';
        }

        var btnClass = hasLowStock ? 'btn-restock low' : 'btn-restock';
        tr.innerHTML = '<td>' + nameCell + '</td>' + sizeCells + '<td style="text-align:center;"><button class="' + btnClass + '" data-idx="' + i + '">ADJUST</button></td>';
        tbody.appendChild(tr);
      }

      document.querySelectorAll('.btn-restock').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(this.dataset.idx);
          openRestockModal(allProducts[idx]);
        });
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    var modal = document.getElementById('restock-modal');
    var currentProduct = null;

    function openRestockModal(product) {
      currentProduct = product;
      document.getElementById('restock-title').textContent = 'Adjust Stock';
      document.getElementById('restock-product-name').textContent = product.name;

      var stock = product.stock || {};
      var sizes = product.sizes || ['S', 'M', 'L', 'XL'];
      var allSizes = ['S', 'M', 'L', 'XL'];
      var inputsHtml = '';

      for (var i = 0; i < allSizes.length; i++) {
        var sz = allSizes[i];
        var currentQty = stock[sz] != null ? stock[sz] : 0;
        var inSizes = sizes.indexOf(sz) > -1;
        inputsHtml +=
          '<div class="stock-input-row">' +
            '<span>' + sz + '</span>' +
            '<input type="number" name="stock-' + sz + '" value="' + currentQty + '" min="0"' + (!inSizes ? ' disabled' : '') + '>' +
          '</div>';
      }

      document.getElementById('restock-inputs').innerHTML = inputsHtml;
      modal.classList.add('open');
    }

    document.getElementById('restock-cancel-btn').addEventListener('click', function() { modal.classList.remove('open'); });
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('open'); });

    document.getElementById('restock-form').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!currentProduct) return;
      if (!checkAuth()) return;

      var stock = currentProduct.stock || {};
      var newStock = {};
      var hasChanges = false;

      document.querySelectorAll('#restock-inputs input').forEach(function(inp) {
        if (inp.disabled) return;
        var size = inp.name.replace('stock-', '');
        var newQty = parseInt(inp.value) || 0;
        newStock[size] = newQty;
        if (newQty !== (stock[size] || 0)) hasChanges = true;
      });

      if (!hasChanges) {
        alert('No changes made.');
        return;
      }

      var saveBtn = document.getElementById('restock-save-btn');
      saveBtn.textContent = 'SAVING...';
      saveBtn.disabled = true;

      authFetch('/api/admin/products/' + currentProduct.id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stock: newStock })
      })
      .then(function(r) { return r.json(); })
      .then(function() {
        modal.classList.remove('open');
        saveBtn.textContent = 'SAVE';
        saveBtn.disabled = false;
        loadStock();
      })
      .catch(function() {
        alert('Failed to update stock.');
        saveBtn.textContent = 'SAVE';
        saveBtn.disabled = false;
      });
    });

    document.getElementById('logout-btn').addEventListener('click', function() {
      localStorage.removeItem('trio_admin_token');
      window.location.href = 'login.html';
    });

    loadStock();
  </script>
</body>
</html>
